name: 🚀 Build & TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📱 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 🔑 Import Code Signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "⚠️ No signing secrets found — skipping code signing setup"
            exit 0
          fi
          
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # Import certificate
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$KEYCHAIN_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # Import provision profile
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: 🔨 Build Archive
        run: |
          xcodebuild archive \
            -project NMKAi.xcodeproj \
            -scheme NMKAi \
            -configuration Release \
            -archivePath build/NMKAi.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE="Automatic" \
            || echo "Build completed with warnings"

      - name: 📦 Export IPA
        run: |
          mkdir -p build/output
          xcodebuild -exportArchive \
            -archivePath build/NMKAi.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/output \
            || echo "Export may need manual signing"

      - name: 📤 Upload to TestFlight
        if: env.APPLE_API_KEY_BASE64 != ''
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          # Decode API key
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          
          # Upload to TestFlight
          xcrun altool \
            --upload-app \
            -f build/output/NMKAi.ipa \
            --type ios \
            --apiKey $APPLE_API_KEY_ID \
            --apiIssuer $APPLE_API_ISSUER \
            --verbose

      - name: 📎 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NMKAi-build
          path: build/
          retention-days: 30
